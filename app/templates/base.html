<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocQuery — Multimodal RAG</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Design tokens ── */
        :root {
            --navy:       #1E3A5F;
            --navy-light: #2A4E7A;
            --indigo:     #4F6EF7;
            --indigo-dim: #EEF1FE;
            --surface:    #FAFBFC;
            --white:      #FFFFFF;
            --border:     #E4E7EC;
            --text-hi:    #111827;
            --text-mid:   #374151;
            --text-lo:    #6B7280;
            --success:    #10B981;
            --warn:       #F59E0B;
            --danger:     #EF4444;

            --radius-sm:  6px;
            --radius-md:  10px;
            --radius-lg:  16px;
            --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
            --shadow-md:  0 4px 12px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.06);
            --transition: 150ms ease;

            font-family: 'Inter', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%;
            background: var(--surface);
            color: var(--text-hi);
            font-size: 14px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── App shell ── */
        .app-shell {
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-columns: 280px 1fr;
            grid-template-areas:
                "topbar topbar"
                "sidebar main";
            height: 100vh;
            overflow: hidden;
        }

        /* ── Topbar ── */
        .topbar {
            grid-area: topbar;
            background: var(--navy);
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 24px;
            z-index: 10;
        }

        .topbar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .topbar-logo-icon {
            width: 30px;
            height: 30px;
            background: var(--indigo);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .topbar-logo-icon svg { width: 16px; height: 16px; color: #fff; }

        .topbar-wordmark {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -.2px;
        }

        .topbar-wordmark span {
            color: #8FA8F8;
            font-weight: 400;
        }

        .topbar-divider {
            width: 1px;
            height: 20px;
            background: rgba(255,255,255,.15);
            margin: 0 4px;
        }

        .bucket-input-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-sm);
            padding: 0 10px;
            height: 34px;
            transition: border-color var(--transition);
        }

        .bucket-input-wrap:focus-within {
            border-color: var(--indigo);
        }

        .bucket-input-wrap svg {
            width: 14px; height: 14px;
            color: rgba(255,255,255,.5);
            flex-shrink: 0;
        }

        .bucket-input-wrap input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            width: 180px;
        }

        .bucket-input-wrap input::placeholder { color: rgba(255,255,255,.4); }

        .topbar-spacer { flex: 1; }

        /* ── Sidebar ── */
        .sidebar {
            grid-area: sidebar;
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-lo);
            margin-bottom: 12px;
        }

        /* Upload zone */
        .upload-zone {
            border: 1.5px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--indigo);
            background: var(--indigo-dim);
        }

        .upload-zone input[type="file"] {
            position: absolute; inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
        }

        .upload-zone-icon {
            width: 32px; height: 32px;
            background: var(--indigo-dim);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
        }

        .upload-zone-icon svg { width: 16px; height: 16px; color: var(--indigo); }

        .upload-zone p {
            font-size: 12px;
            color: var(--text-lo);
            line-height: 1.4;
        }

        .upload-zone strong { color: var(--indigo); font-weight: 600; }

        .btn-upload {
            margin-top: 10px;
            width: 100%;
            height: 34px;
            background: var(--indigo);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: background var(--transition), opacity var(--transition);
        }

        .btn-upload:hover { background: #3A58E0; }
        .btn-upload:disabled { opacity: .5; cursor: default; }

        .upload-status {
            margin-top: 8px;
            font-size: 12px;
            min-height: 16px;
            color: var(--text-lo);
            text-align: center;
        }

        .upload-status.success { color: var(--success); }
        .upload-status.error   { color: var(--danger); }

        /* Doc list */
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px;
        }

        .doc-list-empty {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-lo);
            font-size: 13px;
        }

        .doc-list-empty svg {
            width: 36px; height: 36px;
            color: var(--border);
            margin-bottom: 8px;
        }

        .doc-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: var(--radius-md);
            cursor: default;
            transition: background var(--transition);
            position: relative;
        }

        .doc-item:hover { background: var(--surface); }

        .doc-item-icon {
            width: 32px; height: 32px;
            background: var(--indigo-dim);
            border-radius: var(--radius-sm);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .doc-item-icon svg { width: 16px; height: 16px; color: var(--indigo); }

        .doc-item-info { flex: 1; min-width: 0; }

        .doc-item-name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .doc-item-meta {
            font-size: 11px;
            color: var(--text-lo);
            margin-top: 1px;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.ready      { background: var(--success); }
        .status-dot.processing { background: var(--warn); animation: pulse 1.2s infinite; }
        .status-dot.error      { background: var(--danger); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: .3; }
        }

        .btn-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-lo);
            padding: 4px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            opacity: 0;
            transition: opacity var(--transition), color var(--transition);
        }

        .doc-item:hover .btn-delete { opacity: 1; }
        .btn-delete:hover { color: var(--danger); }
        .btn-delete svg { width: 14px; height: 14px; }

        /* ── Main chat ── */
        .main {
            grid-area: main;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--surface);
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header-title {
            font-size: 15px;
            font-weight: 600;
        }

        .chat-header-sub {
            font-size: 12px;
            color: var(--text-lo);
            margin-top: 1px;
        }

        /* Chat messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Empty state */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            color: var(--text-lo);
        }

        .chat-empty-icon {
            width: 56px; height: 56px;
            background: var(--indigo-dim);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
        }

        .chat-empty-icon svg { width: 28px; height: 28px; color: var(--indigo); }

        .chat-empty h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-mid);
            margin-bottom: 6px;
        }

        .chat-empty p { font-size: 13px; max-width: 320px; }

        /* Message bubbles */
        .message {
            display: flex;
            gap: 10px;
            max-width: 780px;
        }

        .message.user { flex-direction: row-reverse; align-self: flex-end; }

        .message-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px;
            font-weight: 700;
            flex-shrink: 0;
            align-self: flex-end;
        }

        .message.user .message-avatar {
            background: var(--indigo);
            color: #fff;
        }

        .message.bot .message-avatar {
            background: var(--navy);
            color: #fff;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: var(--radius-lg);
            font-size: 14px;
            line-height: 1.6;
            max-width: calc(100% - 44px);
            word-break: break-word;
        }

        .message.user .message-bubble {
            background: var(--indigo);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: var(--white);
            color: var(--text-hi);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--shadow-sm);
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 12px 16px;
        }

        .typing-indicator span {
            width: 7px; height: 7px;
            background: var(--text-lo);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%            { transform: translateY(-6px); }
        }

        /* ── Chat input area ── */
        .chat-footer {
            padding: 16px 24px;
            background: var(--white);
            border-top: 1px solid var(--border);
        }

        .suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .suggestion-chip {
            height: 28px;
            padding: 0 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 12px;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
        }

        .suggestion-chip:hover {
            border-color: var(--indigo);
            color: var(--indigo);
            background: var(--indigo-dim);
        }

        .chat-input-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .chat-input-box {
            flex: 1;
            min-height: 44px;
            max-height: 120px;
            padding: 10px 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-hi);
            background: var(--surface);
            resize: none;
            outline: none;
            transition: border-color var(--transition);
            line-height: 1.5;
            overflow-y: auto;
        }

        .chat-input-box:focus { border-color: var(--indigo); background: var(--white); }
        .chat-input-box::placeholder { color: var(--text-lo); }

        .btn-send {
            width: 44px; height: 44px;
            background: var(--indigo);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background var(--transition), transform var(--transition);
        }

        .btn-send:hover { background: #3A58E0; }
        .btn-send:active { transform: scale(.95); }
        .btn-send:disabled { opacity: .4; cursor: default; }
        .btn-send svg { width: 18px; height: 18px; }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(2px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            animation: modalIn 200ms ease-out;
        }

        @keyframes modalIn {
            from { transform: translateY(10px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-hi);
        }

        .btn-close-modal {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-lo);
            display: flex;
            padding: 4px;
        }

        .modal-body {
            padding: 24px;
        }

        .settings-group {
            margin-bottom: 20px;
        }

        .settings-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-lo);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .settings-select {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-hi);
            background: var(--surface);
            outline: none;
            transition: border-color var(--transition);
        }

        .settings-select:focus { border-color: var(--indigo); }

        .settings-hint {
            font-size: 12px;
            color: var(--text-lo);
            margin-top: 6px;
            line-height: 1.4;
        }

        .modal-footer {
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
        }

        .btn-save-settings {
            height: 36px;
            padding: 0 20px;
            background: var(--indigo);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }

        .btn-save-settings:hover { background: #3A58E0; }

        .btn-settings {
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background var(--transition);
        }

        .btn-settings:hover { background: rgba(255,255,255,.2); }
        .btn-settings svg { width: 18px; height: 18px; }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #C0C5CE; }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .app-shell {
                grid-template-columns: 1fr;
                grid-template-rows: 56px auto 1fr;
                grid-template-areas:
                    "topbar"
                    "sidebar"
                    "main";
            }
            .sidebar { max-height: 260px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown rendering styles */
        .message-bubble strong { font-weight: 700; }
        .message-bubble ul { margin: 8px 0; padding-left: 20px; }
        .message-bubble p { margin-bottom: 8px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble code { background: var(--indigo-dim); padding: 2px 4px; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="app-shell">
        <!-- Topbar -->
        <header class="topbar">
            <a class="topbar-logo" href="/">
                <div class="topbar-logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <span class="topbar-wordmark">DocQuery <span>RAG</span></span>
            </a>
            <div class="topbar-divider"></div>
            <div class="bucket-input-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-4.5-7H7a4 4 0 00-4 4z"/>
                </svg>
                <input type="text" id="gcsBucket" placeholder="GCS bucket name">
            </div>
            <div class="topbar-spacer"></div>
            <button class="btn-settings" id="btnOpenSettings" title="Configuración de modelos">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </header>

        {% block content %}{% endblock %}
    </div>

    <!-- Modal de Configuración -->
    <div class="modal-overlay" id="modalSettings">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Configuración de Modelos</h2>
                <button class="btn-close-modal" id="btnCloseSettings">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <label class="settings-label">Modelo de Generación</label>
                    <select class="settings-select" id="selectGenModel">
                        <!-- Opciones cargadas dinámicamente -->
                    </select>
                    <p class="settings-hint">Modelo utilizado para responder preguntas y describir imágenes.</p>
                </div>
                <div class="settings-group">
                    <label class="settings-label">Modelo de Embeddings</label>
                    <select class="settings-select" id="selectEmbModel">
                        <!-- Opciones cargadas dinámicamente -->
                    </select>
                    <p class="settings-hint">Modelo utilizado para indexar documentos. Los cambios solo afectan a nuevas subidas.</p>
                </div>
                <div class="settings-group" style="margin-bottom: 0;">
                    <label class="settings-label">Estado Actual</label>
                    <div style="font-size: 13px; color: var(--text-mid); background: var(--surface); padding: 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);">
                        <div><strong>Generación:</strong> <span id="currentGenModel">Cargando...</span></div>
                        <div style="margin-top: 4px;"><strong>Embeddings:</strong> <span id="currentEmbModel">Cargando...</span></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-save-settings" id="btnSaveSettings">Guardar Cambios</button>
            </div>
        </div>
